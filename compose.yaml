services:
  edge:
    build:
      context: .
      dockerfile: Dockerfile.edge
    container_name: aether-edge
    restart: unless-stopped
    network_mode: host
    environment:
      AETHER_DRONE_ID: ${AETHER_DRONE_ID:-AE-01}
      AETHER_DRONE_GROUPS: ${AETHER_DRONE_GROUPS:-}
      AETHER_EDGE_DISCONNECT_TIMEOUT_S: ${AETHER_EDGE_DISCONNECT_TIMEOUT_S:-15.0}
      AETHER_EDGE_STATUS_PERIOD_S: ${AETHER_EDGE_STATUS_PERIOD_S:-1.0}
      AETHER_FLEET_COMMANDS_TOPIC: ${AETHER_FLEET_COMMANDS_TOPIC:-/fleet/commands}
      AETHER_FLEET_ACKS_TOPIC: ${AETHER_FLEET_ACKS_TOPIC:-/fleet/acks}
      AETHER_FLEET_TELEMETRY_TOPIC: ${AETHER_FLEET_TELEMETRY_TOPIC:-/fleet/telemetry}

  flight:
    build:
      context: .
      dockerfile: Dockerfile.flight
    container_name: aether-flight
    restart: unless-stopped
    network_mode: host
    devices:
      - ${AETHER_FLIGHT_DEVICE:-/dev/ttyUSB0}:${AETHER_FLIGHT_DEVICE:-/dev/ttyUSB0}
    environment:
      AETHER_DRONE_ID: ${AETHER_DRONE_ID:-AE-01}
      AETHER_FLIGHT_PORT: ${AETHER_FLIGHT_DEVICE:-/dev/ttyUSB0}
      AETHER_FLIGHT_BAUD_RATE: ${AETHER_FLIGHT_BAUD_RATE:-115200}

  sensor:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    container_name: aether-sensor
    restart: unless-stopped
    network_mode: host
    profiles: ["optional"]
    devices:
      - /dev/gpiomem:/dev/gpiomem
    environment:
      AETHER_DRONE_ID: ${AETHER_DRONE_ID:-AE-01}
      LGPIO_CHIP: ${LGPIO_CHIP:-4}
      AETHER_SENSOR_DHT_PIN: ${AETHER_SENSOR_DHT_PIN:-D4}

  vision:
    build:
      context: .
      dockerfile: Dockerfile.vision
    container_name: aether-vision
    restart: unless-stopped
    network_mode: host
    profiles: ["optional"]
    devices:
      - ${AETHER_CAMERA_DEVICE:-/dev/video0}:${AETHER_CAMERA_DEVICE:-/dev/video0}
    environment:
      AETHER_DRONE_ID: ${AETHER_DRONE_ID:-AE-01}
      AETHER_VISION_CAMERA_INDEX: ${AETHER_VISION_CAMERA_INDEX:-0}
      AETHER_VISION_MODEL_PATH: ${AETHER_VISION_MODEL_PATH:-yolo26n.pt}
