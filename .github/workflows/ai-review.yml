name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read
  issues: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_BASE: https://openrouter.ai/api/v1
          CONFIG.MODEL: ${{ vars.REVIEW_MODEL }}
          CONFIG.MODEL_TURBO: ${{ vars.REVIEW_MODEL }}
          PR_REVIEWER.EXTRA_INSTRUCTIONS: |
            This is the Aether autonomous drone platform (ROS 2 Jazzy, C++20, Python 3, Raspberry Pi 5).
            Review for:
            - Bugs and logic errors (especially in hardware I/O: serial, MAVLink, GPIO)
            - Security vulnerabilities (unvalidated input from serial/MAVLink, hardcoded device paths)
            - Performance issues (blocking I/O in timer callbacks, unnecessary memory allocation in hot paths)
            - Code quality (PascalCase classes, snake_case functions, trailing underscore for private members)
            - ROS 2 conventions (ROS logger for all logging, timer-based pub/sub loops, error handling via try/except in Python and return codes in C++)
            Do not flag autonomy_node — it is a known incomplete stub.
